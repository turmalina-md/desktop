name: turmalina
description: Turmalina desktop application.

publish_to: "none"
homepage: https://softyes.com.br
repository: https://github.com/turmalina-md/desktop

version: 0.1.0+1

environment:
  sdk: ^3.12.2
  flutter: ^3.44.4

dependencies:
  flutter:
    sdk: flutter

  turmalina_ui:
    git:
      ref: main
      url: https://github.com/turmalina-md/uikit
  turmalina_engine:
    git:
      ref: main
      url: https://github.com/turmalina-md/engine

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  very_good_analysis: ^10.3.0

flutter:
  uses-material-design: false
